version: "2"
linters:
  default: none
  enable:
    - revive
    - gocritic
    - errcheck
    - staticcheck
    - gosec
    - unparam
    - wastedassign
    - nilnil
    - errorlint
    - tagliatelle
    - forbidigo
    - depguard
  settings:
    tagliatelle:
      case:
        rules:
          json: camel
    forbidigo:
      forbid:
        - pattern: '^slog\.Default\(\)'
          msg: use injected logger (kernel/log.Std), not slog.Default
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G104
    depguard:
      rules:
        kernel_no_plugins:
          files:
            - "**/kernel/**"
          deny:
            - pkg: "github.com/ageneralai/maven/plugins/"
              desc: "kernel must not import plugins"
  exclusions:
    rules:
      - path: cmd/
        linters:
          - forbidigo
          - gosec
          - gocritic
      - path: _test\.go
        linters:
          - gosec
          - unparam
      - path: plugins/channels/
        linters:
          - tagliatelle
          - gosec
      - path: plugins/voice/
        linters:
          - tagliatelle
          - gosec
      - path: plugins/tools/acp/
        linters:
          - gosec
      - path: kernel/config/
        linters:
          - tagliatelle
      - path: kernel/memory/
        linters:
          - gosec
      - path: kernel/prompt/
        linters:
          - gosec
      - path: kernel/channels/webhook/
        linters:
          - gosec
      - path: internal/testutil/
        linters:
          - gosec
      - path: kernel/slash/
        linters:
          - gocritic
      - path: plugins/channels/whatsapp/
        linters:
          - gocritic
      - path: plugins/channels/telegram/stream_state\.go
        linters:
          - unparam
run:
  timeout: 5m
