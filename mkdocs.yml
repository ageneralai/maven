site_name: Maven Agent
site_url: https://ageneralai.github.io/maven/

theme:
  name: material
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - toc.follow

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Channels:
    - Telegram: telegram-setup.md
    - Feishu: feishu-setup.md
    - WeCom: wecom-setup.md
  - Features:
    - Subagents: subagents.md
    - ACP: acp.md
    - Voice: voice.md
    - Plugins: plugins.md
    - Workspace: workspace.md
  - Contributing: contributing.md

exclude_docs: |
  workspace/**
