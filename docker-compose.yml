services:
  maven:
    build: .
    restart: unless-stopped
    ports:
      - "18790:18790"
      - "9876:9876"
      - "9886:9886"
    volumes:
      - maven-data:/root/.maven
    environment:
      - MAVEN_API_KEY=${MAVEN_API_KEY}
      - MAVEN_TELEGRAM_TOKEN=${MAVEN_TELEGRAM_TOKEN:-}
      - MAVEN_FEISHU_APP_ID=${MAVEN_FEISHU_APP_ID:-}
      - MAVEN_FEISHU_APP_SECRET=${MAVEN_FEISHU_APP_SECRET:-}
      - MAVEN_WECOM_TOKEN=${MAVEN_WECOM_TOKEN:-}
      - MAVEN_WECOM_ENCODING_AES_KEY=${MAVEN_WECOM_ENCODING_AES_KEY:-}
      - MAVEN_WECOM_RECEIVE_ID=${MAVEN_WECOM_RECEIVE_ID:-}

  # Optional: expose webhook via cloudflared tunnel
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --url http://maven:9876
    depends_on:
      - maven

volumes:
  maven-data:
